<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据录入后台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif;}
        body{background:#f3f6fa;padding:20px 15px;}
        .container{max-width:800px;margin:0 auto;background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
        h2{text-align:center;margin-bottom:20px;color:#2357d4;}
        .tip{background:#e6f0ff;padding:10px;border-radius:6px;margin-bottom:15px;font-size:14px;color:#1e40af;}
        .form-item{margin:15px 0;}
        label{display:block;margin-bottom:6px;font-weight:500;font-size:14px;}
        input{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;font-size:14px;}
        button{padding:10px 18px;border:none;border-radius:6px;cursor:pointer;margin-right:10px;font-size:14px;margin-bottom:10px;}
        .btn-add{background:#2357d4;color:#fff;}
        .btn-clear{background:#9c27b0;color:#fff;}
        .btn-save{background:#009688;color:#fff;}
        .btn-del{background:#f44336;color:#fff;}
        .record-list{margin-top:20px;border:1px solid #eee;border-radius:8px;}
        .record-row{display:flex;padding:12px;border-bottom:1px solid #eee;align-items:center;font-size:13px;}
        .record-row:last-child{border-bottom:none;}
        .record-row>div{flex:1;}
        .mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999;}
        .dialog{background:#fff;padding:25px;border-radius:10px;width:90%;max-width:350px;}
        .dialog h3{margin-bottom:15px;}
        .dialog-btn{margin-top:20px;text-align:right;}
    </style>
</head>
<body>
<div class="container">
    <h2>客流数据录入后台</h2>
    <div class="tip">录入数据自动本地保存，关闭网页也不丢失；导出data.json后可上传替换更新线上数据</div>

    <div class="form-item">
        <label>统计日期</label>
        <input type="date" id="dateVal">
    </div>
    <div class="form-item">
        <label>开始时段</label>
        <input type="time" id="startVal">
    </div>
    <div class="form-item">
        <label>结束时段</label>
        <input type="time" id="endVal">
    </div>
    <div class="form-item">
        <label>南门人数</label>
        <input type="number" id="southVal" placeholder="填写数字">
    </div>
    <div class="form-item">
        <label>北门人数</label>
        <input type="number" id="northVal" placeholder="填写数字">
    </div>

    <button class="btn-add" onclick="addData()">新增数据</button>
    <button class="btn-clear" onclick="openClearModal()">清空全部</button>
    <button class="btn-save" onclick="downloadJson()">导出data文件</button>

    <h3 style="margin:20px 0 10px;font-size:16px;">已录入列表</h3>
    <div class="record-list" id="recordBox"></div>
</div>

<!-- 删除弹窗 -->
<div class="mask" id="delModal">
    <div class="dialog">
        <h3>确认删除</h3>
        <p>删除后无法恢复</p>
        <div class="dialog-btn">
            <button class="btn-del" onclick="confirmDel()">确认</button>
            <button onclick="closeDelModal()">取消</button>
        </div>
    </div>
</div>

<!-- 清空弹窗 -->
<div class="mask" id="clearModal">
    <div class="dialog">
        <h3>清空所有数据</h3>
        <p>全部记录将被清除</p>
        <div class="dialog-btn">
            <button class="btn-del" onclick="confirmClear()">确认清空</button>
            <button onclick="closeClearModal()">取消</button>
        </div>
    </div>
</div>

<script>
let dataList = [];
let delTargetId = null;
// 本地存储键名
const STORAGE_KEY = 'local_flow_data';

// 初始化加载：优先读取本地缓存，再尝试读取服务器json
async function initLoad(){
    // 1. 先读取浏览器本地保存的数据
    const localData = localStorage.getItem(STORAGE_KEY);
    if(localData){
        try{
            dataList = JSON.parse(localData);
        }catch(e){
            dataList = [];
        }
    }

    // 2. 可选：读取同目录data.json，合并使用（不需要可注释这段）
    try{
        const res = await fetch("./data.json?t="+Date.now());
        const json = await res.json();
        if (Array.isArray(json) && json.length > 0) {
            // 简单去重合并
            json.forEach(item=>{
                const exist = dataList.find(d=>d.id === item.id);
                if(!exist) dataList.push(item);
            })
            saveLocalData();
        }
    }catch(e){
        console.log("本地无data.json文件，仅使用缓存数据");
    }

    renderList();
}

// 保存数据到浏览器本地存储
function saveLocalData(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(dataList));
}

// 添加单条数据
function addData(){
    let d = document.getElementById("dateVal").value;
    let sTime = document.getElementById("startVal").value;
    let eTime = document.getElementById("endVal").value;
    let south = parseInt(document.getElementById("southVal").value) || 0;
    let north = parseInt(document.getElementById("northVal").value) || 0;
    if(!d||!sTime||!eTime){
        alert("请完整填写日期和时段");
        return;
    }
    dataList.push({
        id: Date.now(),
        date:d,
        startTime:sTime,
        endTime:eTime,
        south:south,
        north:north
    });
    // 新增后立刻本地保存
    saveLocalData();
    alert("添加成功，数据已本地保存");
    renderList();
    // 清空输入框
    document.getElementById("dateVal").value = "";
    document.getElementById("startVal").value = "";
    document.getElementById("endVal").value = "";
    document.getElementById("southVal").value = "";
    document.getElementById("northVal").value = "";
}

// 渲染列表
function renderList(){
    const box = document.getElementById("recordBox");
    box.innerHTML = "";
    dataList.forEach(item=>{
        let row = document.createElement("div");
        row.className = "record-row";
        row.innerHTML = `
            <div>${item.date}</div>
            <div>${item.startTime}-${item.endTime}</div>
            <div>南门:${item.south}</div>
            <div>北门:${item.north}</div>
            <div><button class="btn-del" onclick="openDelModal(${item.id})">删除</button></div>
        `;
        box.appendChild(row);
    });
}

// 下载json文件，格式不变，用于线上替换
function downloadJson(){
    const jsonStr = JSON.stringify(dataList, null, 2);
    const blob = new Blob([jsonStr],{type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "data.json";
    a.click();
    URL.revokeObjectURL(url);
    alert("data.json 已下载！替换上传到仓库即可生效");
}

// 删除相关
function openDelModal(id){
    delTargetId = id;
    document.getElementById("delModal").style.display = "flex";
}
function closeDelModal(){
    document.getElementById("delModal").style.display = "none";
}
function confirmDel(){
    dataList = dataList.filter(item=>item.id !== delTargetId);
    saveLocalData();
    closeDelModal();
    renderList();
}

// 清空相关
function openClearModal(){
    document.getElementById("clearModal").style.display = "flex";
}
function closeClearModal(){
    document.getElementById("clearModal").style.display = "none";
}
function confirmClear(){
    dataList = [];
    saveLocalData();
    closeClearModal();
    renderList();
}

window.onload = initLoad;
</script>
</body>
</html>
